      .subtitle { font-size: 14px; fill: #5C3D2E; }
      .layerLabel { font-size: 13px; font-weight: 700; fill: #5C3D2E; letter-spacing: 1px; }
      .layerSub { font-size: 11px; fill: #5C3D2E; opacity: 0.7; }
