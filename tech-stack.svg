    <text x="320" y="118" text-anchor="middle" class="extTitle">OpenAI API</text>
    <text x="320" y="138" text-anchor="middle" class="extSub">GPT-4o (Vision) — 部屋解析</text>
    <text x="320" y="154" text-anchor="middle" class="extSub">DALL-E 3 — ドット絵生成</text>
  </g>

  <!-- Firebase -->
